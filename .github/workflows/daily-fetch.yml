name: Daily Data Fetch

on:
  schedule:
    # 23:00 UTC = 07:00 SGT — well after EMC's D+6 release lag
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Data source to fetch (all | emc | ema | live | oem)'
        default: 'all'
        required: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.9.17"

      - name: Install dependencies
        run: uv sync

      - name: Fetch data
        run: uv run oem fetch --source ${{ github.event.inputs.source || 'all' }}

      - name: Commit new data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No new data" || (
            git commit -m "chore: daily fetch $(date -u +%Y-%m-%d)" && git push
          )
